    />

    <style>
      body {
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        margin: 0;
        height: 100vh;
        overflow-x: hidden;
      }

      /* ===== BACKGROUND MOSAICO + PARALLAX ===== */
      .background {
        position: fixed;
        inset: 0;

        background-image: url("https://i.pinimg.com/736x/71/79/12/71791235f2c99800a84630b2e5318ba4.jpg");

        background-repeat: repeat;
        background-size: 200px auto;
        background-position: top left;

        z-index: -2;
      }

      /* ===== BLUR + OVERLAY ===== */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      .container {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 20px;
      }

      .logo-area {
        position: relative;
        width: 400px;
        height: 118px;
        margin: 20px 0 0 20px;
      }

      .logo-rect {
        position: relative;
        z-index: 0;
        width: 400px;
        height: 127px;
        right: 20px;
        background: #5b4141;
      }

      .logo-rect::before {
        content: "";
        position: absolute;
        top: 12px;
        right: 14px;
        width: 14px;
        height: 14px;
        background: #fbdce4;
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
      }

      .logo {
        position: absolute;
        z-index: 1;
        left: 12px;
        top: 5px;
        max-width: 220px;
        height: auto;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .boxes {
        display: flex;
        gap: 10px;
      }

      .box {
        width: 180px;
        height: 180px;
        border: 2px dashed #fbdce4;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        position: relative;
        background: #5b4141;
      }

      .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .add-btn {
        font-size: 35px;
        cursor: pointer;
        color: #5b4141;
      }

      .add-btn:hover {
        color: #fbdce4;
        transform: scale(1.1);
      }

      .remove-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 20px;
        height: 20px;
        font-size: 14px;
        background: #fbdce4;
        color: #5b4141;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .modal img {
        max-width: 90%;
        max-height: 90%;
      }

      .profile-toggle {
        position: fixed;
        top: 24px;
        right: 22px;
        width: 52px;
        height: 20px;
        border: 0;
        background: #5b4141;
        cursor: pointer;
        z-index: 15;
      }

      .profile-toggle::after {
        content: "<";
        color: #fbdce4;
        font-size: 12px;
      }

      .profile-toggle.open::after {
        content: ">";
      }

      .profile-panel {
        position: fixed;
        top: 53px;
        right: -340px;
        width: 290px;
        min-height: 166px;
        padding: 18px 16px;
        background: rgba(91, 65, 65, 0.97);
        border: 1px solid #fbdce4;
        box-sizing: border-box;
        transition: right 0.35s ease;
        z-index: 14;
      }

      .profile-panel.open {
        right: 22px;
      }

      .profile-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .profile-image-wrap {
        position: relative;
        width: 84px;
        height: 84px;
        flex-shrink: 0;
      }

      .profile-image {
        width: 73px;
        height: 73px;
        top: 5px;
        left: 5px;
        border: 2px solid #fbdce4;
        box-sizing: border-box;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }

      .profile-frame {
        position: absolute;
        left: -1px;
        top: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        z-index: 1;
      }

      .profile-cover {
        position: absolute;
        top: -8px;
        left: 8px;
        width: auto;
        height: auto;
        max-width: none;
        max-height: none;
        border: none;
        object-fit: fill;
        z-index: 3;
      }

      .github-user {
        color: #fbdce4;
        text-decoration: none;
        font-size: 18px;
        letter-spacing: 0.02em;
      }

      .github-user:hover {
        text-decoration: underline;
      }

      .profile-decor {
        position: relative;
        top: 35px;
        color: #fbdce4;
        left: 6px;
        font-size: 12px;
        letter-spacing: 10px;
      }

      .stars-marquee {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 25px;
        height: 24px;
        overflow: hidden;
        letter-spacing: 50px;
        background: rgba(251, 220, 228, 0.66);
        z-index: 10;
      }

      .stars-track {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        display: inline-flex;
        white-space: nowrap;
        min-width: 100%;
        animation: starScroll 25s linear infinite;
      }

      .stars-track.alt {
        left: 100%;
      }

      .stars-track span {
        color: #5b4141;
        font-size: 9px;
        margin: 0 2px;
      }

      @keyframes starScroll {
        from {
          transform: translate(0, -50%);
        }
        to {
          transform: translate(-100%, -50%);
        }
      }
    </style>
  </head>

  <body>

        <span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span><span>έαΖ</span>

    <script>
      const boxesContainer = document.getElementById("boxes");
      const addBtn = document.getElementById("addBtn");
      const maxBoxes = 4;
      const profileToggle = document.getElementById("profileToggle");
      const profilePanel = document.getElementById("profilePanel");

      const bg = document.getElementById("bg");

      // ===== GERAR BACKGROUND COM IMAGENS COLADAS =====
      async function gerarBackground() {
        const images = document.querySelectorAll(".box img");

        if (images.length === 0) return;

        const imgs = await Promise.all(
          [...images].map((img) => {
            return new Promise((resolve) => {
              const i = new Image();
              i.src = img.src;
              i.onload = () => resolve(i);
            });
          })
        );

        const totalWidth = imgs.reduce((acc, img) => acc + img.width, 0);
        const maxHeight = Math.max(...imgs.map((img) => img.height));

        const canvas = document.createElement("canvas");
        canvas.width = totalWidth;
        canvas.height = maxHeight;

        const ctx = canvas.getContext("2d");

        let x = 0;
        imgs.forEach((img) => {
          ctx.drawImage(img, x, 0);
          x += img.width;
        });

        const finalImage = canvas.toDataURL();

        bg.style.backgroundImage = `url(${finalImage})`;
        bg.style.backgroundRepeat = "repeat";
      }
      // adicionar box
      addBtn.addEventListener("click", () => {
        const currentBoxes = document.querySelectorAll(".box");

        if (currentBoxes.length >= maxBoxes) return;

        const newBox = document.createElement("div");
        newBox.classList.add("box");

        const removeBtn = document.createElement("div");
        removeBtn.classList.add("remove-btn");
        removeBtn.textContent = "├Ω";

        removeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          newBox.remove();
        });

        newBox.appendChild(removeBtn);
        boxesContainer.appendChild(newBox);
      });

      // colar imagem
      document.addEventListener("paste", (event) => {
        const items = event.clipboardData.items;
        const boxes = document.querySelectorAll(".box");

        for (let item of items) {
          if (item.type.startsWith("image/")) {
            const emptyBox = [...boxes].find(
              (box) => !box.querySelector("img")
            );
            if (!emptyBox) return;

            const file = item.getAsFile();
            const url = URL.createObjectURL(file);

            const img = document.createElement("img");
            img.src = url;

            const removeBtn = emptyBox.querySelector(".remove-btn");

            emptyBox.innerHTML = "";

            if (removeBtn) emptyBox.appendChild(removeBtn);

            emptyBox.appendChild(img);
            event.preventDefault();
          }
        }
      });

      // modal
      const modal = document.getElementById("modal");
      const modalImg = document.getElementById("modalImg");

      document.addEventListener("click", (e) => {
        if (e.target.tagName === "IMG" && e.target.closest(".box")) {
          modalImg.src = e.target.src;
          modal.style.display = "flex";
        }
      });

      modal.addEventListener("click", () => {
        modal.style.display = "none";
      });

      profileToggle.addEventListener("click", () => {
        profilePanel.classList.toggle("open");
        profileToggle.classList.toggle("open");
      });
    </script>
