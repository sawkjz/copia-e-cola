<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Colar Imagens</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        height: 100vh;
        overflow-x: hidden;
      }

      /* ===== BACKGROUND MOSAICO + PARALLAX ===== */
      .background {
        position: fixed;
        inset: 0;

        background-image: url("https://i.pinimg.com/736x/71/79/12/71791235f2c99800a84630b2e5318ba4.jpg");

        background-repeat: repeat;
        background-size: 200px auto;
        background-position: top left;

        z-index: -2;
      }

      /* ===== BLUR + OVERLAY ===== */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      .container {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 20px;
      }

      .boxes {
        display: flex;
        gap: 10px;
      }

      .box {
        width: 180px;
        height: 180px;
        border: 2px dashed #aaa;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        position: relative;
        background: white;
      }

      .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .add-btn {
        font-size: 22px;
        cursor: pointer;
        color: #ccc;
      }

      .add-btn:hover {
        color: white;
        transform: scale(1.1);
      }

      .remove-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 20px;
        height: 20px;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
      }

      .modal img {
        max-width: 90%;
        max-height: 90%;
      }
    </style>
  </head>

  <body>
    <!-- background -->
    <div class="background" id="bg"></div>
    <div class="overlay"></div>

    <h3 style="padding-left: 20px; color: white">Ctrl + V pra colar</h3>

    <div class="container">
      <div class="boxes" id="boxes">
        <div class="box"></div>
      </div>

      <div class="add-btn" id="addBtn">+</div>
    </div>

    <div class="modal" id="modal">
      <img id="modalImg" />
    </div>

    <script>
      const boxesContainer = document.getElementById("boxes");
      const addBtn = document.getElementById("addBtn");
      const maxBoxes = 4;

      const bg = document.getElementById("bg");

      // ===== GERAR BACKGROUND COM IMAGENS COLADAS =====
      async function gerarBackground() {
        const images = document.querySelectorAll(".box img");

        if (images.length === 0) return;

        const imgs = await Promise.all(
          [...images].map((img) => {
            return new Promise((resolve) => {
              const i = new Image();
              i.src = img.src;
              i.onload = () => resolve(i);
            });
          })
        );

        const totalWidth = imgs.reduce((acc, img) => acc + img.width, 0);
        const maxHeight = Math.max(...imgs.map((img) => img.height));

        const canvas = document.createElement("canvas");
        canvas.width = totalWidth;
        canvas.height = maxHeight;

        const ctx = canvas.getContext("2d");

        let x = 0;
        imgs.forEach((img) => {
          ctx.drawImage(img, x, 0);
          x += img.width;
        });

        const finalImage = canvas.toDataURL();

        bg.style.backgroundImage = `url(${finalImage})`;
        bg.style.backgroundRepeat = "repeat";
      }

      // ===== PARALLAX =====
      window.addEventListener("scroll", () => {
        bg.style.transform = `translateY(${window.scrollY * 0.2}px)`;
      });

      // adicionar box
      addBtn.addEventListener("click", () => {
        const currentBoxes = document.querySelectorAll(".box");

        if (currentBoxes.length >= maxBoxes) return;

        const newBox = document.createElement("div");
        newBox.classList.add("box");

        const removeBtn = document.createElement("div");
        removeBtn.classList.add("remove-btn");
        removeBtn.textContent = "×";

        removeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          newBox.remove();
          gerarBackground();
        });

        newBox.appendChild(removeBtn);
        boxesContainer.appendChild(newBox);
      });

      // colar imagem
      document.addEventListener("paste", (event) => {
        const items = event.clipboardData.items;
        const boxes = document.querySelectorAll(".box");

        for (let item of items) {
          if (item.type.startsWith("image/")) {
            const emptyBox = [...boxes].find(
              (box) => !box.querySelector("img")
            );
            if (!emptyBox) return;

            const file = item.getAsFile();
            const url = URL.createObjectURL(file);

            const img = document.createElement("img");
            img.src = url;

            const removeBtn = emptyBox.querySelector(".remove-btn");

            emptyBox.innerHTML = "";

            if (removeBtn) emptyBox.appendChild(removeBtn);

            emptyBox.appendChild(img);

            gerarBackground();
          }
        }
      });

      // modal
      const modal = document.getElementById("modal");
      const modalImg = document.getElementById("modalImg");

      document.addEventListener("click", (e) => {
        if (e.target.tagName === "IMG") {
          modalImg.src = e.target.src;
          modal.style.display = "flex";
        }
      });

      modal.addEventListener("click", () => {
        modal.style.display = "none";
      });
    </script>
  </body>
</html>
